spring:
  application:
    name: techstore
  datasource:
    url: jdbc:mysql://localhost:3306/techstore_db
    username: root
    password: 
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format-sql: true

springdoc:
  override-with-generic-response: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/